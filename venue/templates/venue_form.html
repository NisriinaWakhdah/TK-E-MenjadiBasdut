{% extends 'base.html' %}

{% block content %}
<div class="main-content">
    <div class="page-header fade-in-up">
        <h1 class="page-title">
            {% if venue %}Edit Venue{% else %}Buat Venue Baru{% endif %}
        </h1>
    </div>

    <div class="glass-panel fade-in-up" style="animation-delay: 0.1s; max-width: 600px;">
        <form action="#" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Nama Venue</label>
                <input type="text" class="form-control" name="name" value="{{ venue.name|default:'' }}" placeholder="Contoh: ICE BSD Hall 5-6" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Kota</label>
                <input type="text" class="form-control" name="city" value="{{ venue.city|default:'' }}" placeholder="Contoh: Tangerang" required>
            </div>

            <div class="form-group">
                <label class="form-label">Alamat Lengkap</label>
                <textarea class="form-control" name="address" rows="3" placeholder="Masukkan alamat lengkap" required>{{ venue.address|default:'' }}</textarea>
            </div>

            <div class="form-group">
                <label class="form-label">Kapasitas Maksimal</label>
                <input type="number" class="form-control" name="capacity" value="{{ venue.capacity|default:'' }}" placeholder="Contoh: 10000" required>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-4">
                <a href="{% url 'venue_list' %}" class="btn btn-outline">Batal</a>
                <button type="submit" class="btn btn-primary">
                    {% if venue %}Simpan Perubahan{% else %}Simpan Venue{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
